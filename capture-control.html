<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>自动抓取控制台</title>
<style>
body {
    margin: 0;
    padding: 16px;
    font: 14px/1.4 sans-serif;
    background: #f5f5f5;
    color: #1f1f1f;
}

main {
    max-width: 360px;
}

h1 {
    margin: 0 0 12px;
    font-size: 18px;
}

p {
    margin: 0 0 12px;
}

button {
    width: 100%;
    margin: 0 0 8px;
    padding: 10px 12px;
    font: inherit;
    cursor: pointer;
}

#status {
    min-height: 88px;
    padding: 10px 12px;
    background: #ffffff;
    border: 1px solid #d0d0d0;
    white-space: pre-line;
}
</style>
</head>
<body>
<main>
<h1>自动抓取控制台</h1>
<p>
<label for="folder-input">保存子目录</label>
<input id="folder-input" type="text" spellcheck="false" placeholder="SavePageWE/AutoCapture" style="width:100%;margin-top:6px;padding:8px 10px;box-sizing:border-box;">
</p>
<p>
<label for="limit-input">缓存上限（MB）</label>
<input id="limit-input" type="number" min="10" max="2048" step="1" placeholder="10" style="width:100%;margin-top:6px;padding:8px 10px;box-sizing:border-box;">
</p>
<button id="save-settings-button" type="button">保存设置</button>
<button id="start-button" type="button">开始监听</button>
<button id="stop-button" type="button">停止监听并保存</button>
<button id="clear-button" type="button">清空缓存快照</button>
<p id="status">加载中...</p>
</main>
<script src="capture-control.js"></script>
</body>
</html>
